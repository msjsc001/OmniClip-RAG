[pytest]
# Only collect tests from the dedicated test suite directory.
# This prevents pytest from recursively scanning runtime/cache/output folders
# that may contain permission-protected temporary files on Windows.
testpaths =
    tests

# Keep the tree clean for collection even when developers have local build artifacts.
norecursedirs =
    .git
    .venv
    __pycache__
    .pytest_cache
    .tmp
    dist
    build
    runtime
    local_appdata
    .vendor

